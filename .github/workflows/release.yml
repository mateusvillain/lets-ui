name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create unified release tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./packages/lets-ui-tokens/package.json').version")
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"
          for PKG in "@lets-ui/tokens" "@lets-ui/styles" "@lets-ui/components"; do
            git push origin --delete "${PKG}@${VERSION}" 2>/dev/null || true
            git tag -d "${PKG}@${VERSION}" 2>/dev/null || true
          done
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: steps.changesets.outputs.published == 'true'
        run: |
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - --strip-components=1 -C /usr/local/bin --wildcards '*/git-cliff'
          git-cliff --latest --strip all --output /tmp/release_notes.md

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          ANCHOR="v$(echo $VERSION | tr -d '.')"
          CHANGELOG_URL="https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md#$ANCHOR"
          printf '\n**Full Changelog**: %s\n' "$CHANGELOG_URL" >> /tmp/release_notes.md
          gh release create "v$VERSION" --title "v$VERSION" --notes-file /tmp/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
